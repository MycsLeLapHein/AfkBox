<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB6a-s4dbCA-4yzx3y08CeGxx5D9uBjbd0",
    authDomain: "afkbox-b06d8.firebaseapp.com",
    databaseURL: "https://afkbox-b06d8-default-rtdb.firebaseio.com",
    projectId: "afkbox-b06d8",
    storageBucket: "afkbox-b06d8.firebasestorage.app",
    messagingSenderId: "59754502741",
    appId: "1:59754502741:web:0d7e75aa440fe6ab0d52dc"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  window.saveToFirebase = function(stateData) {
    db.ref('boxes').set(stateData)
      .then(() => showSyncStatus('✓ Sauvegardé', '#3fb950'))
      .catch(() => showSyncStatus('✗ Erreur sync', '#f85149'));
  };

  window.listenFirebase = function(callback) {
    db.ref('boxes').on('value', (snapshot) => {
      const data = snapshot.val();
      if(data) callback(data);
    });
  };
</script>

    <div class="ma">
      <button class="btn bc" onclick="closeM()">Annuler</button>
      <button class="btn bo" id="mok" onclick="confirmA()">Ajouter</button>
    </div>
  </div>
</div>

function getTeams(n,p){

  const same=Object.keys(TL).filter(x=>x!==n&&TL[x].faction===h.faction&&bx.includes(x)).slice(0,3);
  const topDR=Object.keys(TL).filter(x=>x!==n&&TL[x].dr>=2.5&&bx.includes(x)).sort((a,b)=>TL[b].dr-TL[a].dr).slice(0,3);
  return[
    {name:`Synergie ${h.faction}`,heroes:[n,...same],desc:`Activation des bonus de faction ${h.faction}. Les héros de même faction se renforcent mutuellement.`,mode:"PvE"},
    {name:"Équipe DR adaptée",heroes:[n,...topDR],desc:`${n} avec les meilleurs héros DR disponibles dans ta box.`,mode:"Dream Realm"},
  ];
}

// ── FIREBASE INIT ───────────────────────────────────────────────
function initFirebase() {
  // App already loaded locally — Firebase connects in background
  showSyncStatus('⟳ Connexion...', '#8b949e');

  // Wait max 5s for Firebase SDK to load
  let attempts = 0;
  const tryConnect = setInterval(() => {
    attempts++;
    if(typeof window.listenFirebase === 'function') {
      clearInterval(tryConnect);
      connectFirebase();
    } else if(attempts > 10) {
      clearInterval(tryConnect);
      showSyncStatus('✗ Hors ligne', '#f85149');
    }
  }, 500);
}

function connectFirebase() {
  let firstLoad = true;
  window.listenFirebase(function(data) {
    if(firstLoad) {
      firstLoad = false;
      // Only load from Firebase if it has more heroes than local
      const fbMycs = data.mycs?.length || 0;
      const fbNams = data.nams?.length || 0;
      const localMycs = state.mycs?.length || 0;
      const localNams = state.nams?.length || 0;
      if(fbMycs >= localMycs && fbNams >= localNams && (fbMycs + fbNams) > 0) {
        state.mycs = data.mycs || [];
        state.nams = data.nams || [];
        localStorage.setItem('afk3', JSON.stringify(state));
        renderS();
      }
      // If local is newer/bigger, push local to Firebase
      else if((localMycs + localNams) > 0) {
        window.saveToFirebase(state);
      }
      showSyncStatus('✓ En ligne', '#3fb950');
    } else {
      // Live update from another device
      state.mycs = data.mycs || [];
      state.nams = data.nams || [];
      localStorage.setItem('afk3', JSON.stringify(state));
      renderS();
      showSyncStatus('✓ Mis à jour', '#4ecdc4');
    }
  });
}

function exportBox(){
  const data = {
    version: 1,
    date: new Date().toISOString(),
    mycs: state.mycs,
    nams: state.nams
  };
  const json = JSON.stringify(data, null, 2);
  // Download JSON file
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'afk-box-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  // Open Google Drive after short delay
  setTimeout(()=>{
    if(confirm('Fichier téléchargé ✓\n\nOuvrir Google Drive pour l\'y déposer ?')){
      window.open('https://drive.google.com/drive/my-drive','_blank');
    }
  }, 800);
}

function importBox(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.mycs && !data.nams) throw new Error('Format invalide');
      if(data.mycs) state.mycs = data.mycs;
      if(data.nams) state.nams = data.nams;
      saveS();
      sel = null;
      document.getElementById('main').innerHTML='<div class="empty-state"><div class="ei">✓</div><p>Box importée avec succès !</p><small>'+
        (data.mycs?.length||0)+' héros Mycs · '+(data.nams?.length||0)+' héros Nams</small></div>';
      renderS();
      alert('Import réussi !\nMycs : '+(data.mycs?.length||0)+' héros\nNams : '+(data.nams?.length||0)+' héros');
    } catch(err){
      alert('Erreur d\'import : fichier invalide.\n'+err.message);
    }
    // Reset input so same file can be re-imported
    event.target.value='';
  };
  reader.readAsText(file);
}

renderS();

function renderL(){

    if(q&&!h.name.toLowerCase().includes(q))return false;
    if(fac!=='all'&&TL[h.name]?.faction!==fac)return false;
    return true;
  }).sort((a,b)=>{
    const ta=TL[a.name],tb=TL[b.name];
    if(!ta&&!tb)return 0;if(!ta)return 1;if(!tb)return-1;
    return ta.rank-tb.rank;
  });
  const el=document.getElementById('hl');
  if(!items.length){
    el.innerHTML=`<div style="padding:20px 14px;text-align:center;color:var(--text3);font-size:13px">${box.length===0?'Box vide — clique "+ Ajouter"':'Aucun résultat'}</div>`;
    return;

  el.innerHTML=items.map(h=>{
    const t=TL[h.name]||{};
    const c=cc(t.cat||'');
    const s=sel===h.name;
    return`<div class="hi${s?(isN?' sn':' sm'):''}" onclick="selH('${h.name}')">

  const sel=document.getElementById('mh');
  if(list.length===0){
    sel.innerHTML='<option value="">Aucun résultat</option>';
    return;
  }
  sel.innerHTML=list.map(n=>{
    const t=TL[n];
    return `<option value="${n}">[${t.tier}] ${n} — ${t.faction}</option>`;
  }).join('');
  sel.selectedIndex=0;
  onHeroChosen();
}
function filterHeroes(){
  const q=document.getElementById('msearch').value.toLowerCase().trim();
  const filtered=q?modalAvail.filter(n=>n.toLowerCase().includes(q)):modalAvail;
  buildHeroOptions(filtered);
}
function onHeroChosen(){
  const n=document.getElementById('mh').value;
  const t=TL[n];
  const hint=document.getElementById('mhint');
  if(n&&t){
    const capLabel=t.excap===0?'EX non prioritaire':t.excap===-1?'Pas d\'EX':t.excap?'Cap EX : +'+t.excap:'?';
    hint.innerHTML='<span style="color:var(--text2)">'+t.faction+' · '+t.role+'</span> &nbsp;|&nbsp; <span style="color:var(--gold)">DR:'+t.dr+' Stage:'+t.stage+' PvP:'+t.pvp+'</span> &nbsp;|&nbsp; <span style="color:var(--purple)">'+capLabel+'</span>';
  } else {
    hint.textContent='';
  }
}

function closeM(){document.getElementById('ov').style.display='none';}
function confirmA(){
  const n=document.getElementById('mh').value;
  if(!n){alert('Choisis un héros !');return;}
  const ex=parseInt(document.getElementById('mex').value);
  const pn=document.getElementById('mpn').value;
  const pw=document.getElementById('mpw').value||'—';
  const box=getBox(prof);
  if(box.find(h=>h.name===n)){alert('Déjà dans la box !');return;}
  box.push({name:n,ex,pn,power:pw});
  saveS();closeM();renderS();selH(n);
}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeM();});

// ── AI ───────────────────────────────────────────────────────────
async function ai(nm){
  const q=document.getElementById('aiq')?.value?.trim();if(!q)return;
  const L=document.getElementById('ail'),R=document.getElementById('air');
  L.style.display='';R.style.display='none';
  const box=getBox(prof);
  const sum=box.slice(0,25).map(h=>`${h.name}(EX+${h.ex},${h.pn})`).join(', ');
  const t=TL[nm]||{};
  const prompt=`Tu es un expert AFK Journey. Héros sélectionné : ${nm} (Tier ${t.tier||'?'}, ${t.faction||''}, DR:${t.dr}, Stage:${t.stage}). Box du joueur : ${sum}. Question : ${q}. Réponds en français, max 200 mots, conseils concrets basés sur cette box exacte.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await res.json();
    R.textContent=d.content?.map(b=>b.text||'').join('')||'Erreur.';R.style.display='';
  }catch(e){R.textContent='⚠️ Erreur de connexion.';R.style.display='';}
  L.style.display='none';
}

renderS();
initFirebase();
</script>
