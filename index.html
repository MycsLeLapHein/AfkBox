<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Journey — Box Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bg4:#21262d;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#ff6b35;--accent2:#4ecdc4;--purple:#bf7fff;
  --gold:#ffd700;--red:#f85149;--green:#3fb950;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:0}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap}
.topbar-sub{font-size:11px;color:var(--text3);white-space:nowrap}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.tbtn{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}

/* BOX TABS */
.box-tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.box-tab{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.box-tab:hover{border-color:var(--border2);color:var(--text)}
.box-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.1);font-weight:700}
.box-tab .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:rgba(255,107,53,.2);color:var(--accent)}
.box-tab.active .tab-del{display:inline-flex}
.tab-del{display:none;width:16px;height:16px;border-radius:50%;background:rgba(248,81,73,.2);color:var(--red);font-size:10px;align-items:center;justify-content:center;cursor:pointer;margin-left:2px}
.tab-del:hover{background:var(--red);color:#fff}
.add-box-btn{padding:6px 12px;border-radius:20px;border:2px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.add-box-btn:hover{border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 106px)}
.sidebar{width:290px;min-width:240px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;background:var(--bg)}

/* SIDEBAR */
.sidebar-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:rgba(255,107,53,.2);color:var(--accent)}
.sidebar-header h2{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hcount{font-size:11px;color:var(--text3);flex-shrink:0}
.add-btn{padding:5px 10px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.sw{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sw input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none}
.sw input:focus{border-color:var(--border2)}
.ff{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.fb{padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit}
.fb.on{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.hl{flex:1;overflow-y:auto;padding:6px 0}
.hi{padding:7px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.hi:hover{background:var(--bg3)}
.hi.sel{background:var(--bg3);border-left-color:var(--accent)}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hn{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0}
.ts{background:rgba(255,215,0,.15);color:var(--gold)}
.ta{background:rgba(78,205,196,.15);color:var(--accent2)}
.exb{font-size:10px;color:var(--accent);flex-shrink:0}

/* EMPTY STATES */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2);padding:20px;text-align:center}
.ei{font-size:48px;opacity:.25}
.empty-state p{font-size:14px}
.empty-state small{font-size:12px;color:var(--text3)}
.no-box{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 106px);gap:16px;color:var(--text2);text-align:center;padding:20px}
.no-box .big-icon{font-size:64px;opacity:.2}
.no-box h2{font-size:20px;font-weight:700;color:var(--text)}
.no-box p{font-size:14px;max-width:300px;line-height:1.6}
.create-box-btn{padding:12px 24px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.create-box-btn:hover{opacity:.85}

/* DETAIL */
.detail{padding:20px;max-width:680px}
.dh{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.dav{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;border:2px solid}
.di h2{font-size:20px;font-weight:700;margin-bottom:5px}
.di .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid transparent}
.bs{background:rgba(255,215,0,.12);color:var(--gold);border-color:rgba(255,215,0,.25)}
.ba{background:rgba(78,205,196,.12);color:var(--accent2);border-color:rgba(78,205,196,.25)}
.bf{background:var(--bg3);color:var(--text2);border-color:var(--border)}
.di .note{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.scl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.scv{font-size:18px;font-weight:700}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.sec h3{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sl{font-size:12px;color:var(--text2);width:90px;flex-shrink:0}
.st{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.sf{height:100%;border-radius:3px;transition:width .5s}
.sn{font-size:12px;font-weight:600;width:28px;text-align:right;flex-shrink:0}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ef{display:flex;flex-direction:column;gap:3px}
.ef label{font-size:11px;color:var(--text2)}
.ef select,.ef input{padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.ef select:focus,.ef input:focus{border-color:var(--border2)}
.ea{display:flex;gap:8px;margin-top:10px}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn:hover{opacity:.85}
.bsv{background:var(--green);color:#fff}
.bdl{background:transparent;color:var(--red);border:1px solid rgba(248,81,73,.3)}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.tt{font-size:13px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:4px}
.tm{font-size:11px;color:var(--text3)}
.td{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.thl{display:flex;flex-wrap:wrap;gap:5px}
.th{padding:4px 9px;border-radius:14px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}
.th.o{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}
.th.x{border:1px dashed var(--border);color:var(--text3)}
.aiw{background:var(--bg2);border:1px solid rgba(191,127,255,.25);border-radius:10px;padding:14px;margin-bottom:12px}
.aiw h3{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}
.air{display:flex;gap:7px}
.air input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.3);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.air input:focus{border-color:var(--purple)}
.air button{padding:7px 14px;border-radius:6px;border:none;background:var(--purple);color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.ail{font-size:13px;color:var(--text2);padding:8px 0;display:none}
.airesp{margin-top:10px;font-size:13px;line-height:1.7;color:var(--text);background:var(--bg3);border-radius:6px;padding:12px;white-space:pre-wrap;display:none}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;width:360px;max-width:94vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.mf select,.mf input[type=text]{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.mf select:focus,.mf input:focus{border-color:var(--border2)}
.hint{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6}
.ma{display:flex;gap:8px;margin-top:14px}
.bc{background:transparent;color:var(--text2);border:1px solid var(--border);font-family:inherit;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.bo{background:var(--accent);color:#fff;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.bo:hover{opacity:.85}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Mobile touch fixes */
button{-webkit-tap-highlight-color:rgba(255,107,53,.2);touch-action:manipulation;cursor:pointer}
.hi{-webkit-tap-highlight-color:rgba(255,255,255,.05);touch-action:manipulation}
.box-tab{-webkit-tap-highlight-color:rgba(255,107,53,.2);touch-action:manipulation}
.add-box-btn{-webkit-tap-highlight-color:rgba(255,107,53,.2);touch-action:manipulation}
* {-webkit-tap-highlight-color:transparent}
button, .hi, .box-tab, .add-box-btn, .fb, .tbtn, .color-opt {touch-action:manipulation}

/* MOBILE */
@media(max-width:768px){
  .topbar{padding:8px 12px}
  .topbar-sub{display:none}
  .topbar-logo{font-size:13px}
  .tbtn span{display:none}
  .box-tabs-wrap{padding:6px 10px;gap:5px}
  .box-tab{padding:5px 10px;font-size:12px}
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 110px)}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);max-height:42vh}
  .main{flex:1;min-height:50vh}
  .detail{padding:12px}
  .dh{gap:10px;margin-bottom:14px}
  .dav{width:44px;height:44px;font-size:15px}
  .di h2{font-size:16px}
  .sg{grid-template-columns:1fr 1fr;gap:6px}
  .sc{padding:8px}.scv{font-size:16px}
  .sec{padding:10px;margin-bottom:10px}
  .eg{grid-template-columns:1fr 1fr;gap:6px}
  .ef select,.ef input{font-size:12px;padding:6px 8px}
  .btn{padding:6px 10px;font-size:12px}
  .tc{padding:10px}
  .th{font-size:10px;padding:3px 7px}
  .modal{width:94vw;padding:16px}
  #mh{height:110px}
  .no-box{height:calc(100vh - 110px)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-logo">⚔ AFK Journey</div>
    <div class="topbar-sub">Box Manager</div>
  </div>
  <div class="topbar-right">
    <button class="tbtn" onclick="exportBox()">☁ <span>Export</span></button>
    <button class="tbtn" onclick="document.getElementById('import-input').click()">📥 <span>Import</span></button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importBox(event)">
  </div>
</div>

<!-- BOX TABS -->
<div class="box-tabs-wrap" id="box-tabs">
  <button class="add-box-btn" onclick="openCreateBox()">+ Ajouter une box</button>
</div>

<!-- LAYOUT -->
<div class="layout" id="layout">
  <div class="no-box" id="no-box-state">
    <div class="big-icon">📦</div>
    <h2>Aucune box</h2>
    <p>Crée ta première box pour commencer à gérer tes héros !</p>
    <button class="create-box-btn" onclick="openCreateBox()">+ Créer une box</button>
  </div>
</div>

<!-- SIDEBAR (hidden until box selected) -->
<div id="sidebar-wrap" style="display:none">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sav" id="sav">?</div>
        <h2 id="stit">Ma Box</h2>
        <span class="hcount" id="hcnt"></span>
        <button class="add-btn" onclick="openM()">+ Ajouter</button>
      </div>
      <div class="sw"><input type="text" id="srch" placeholder="Rechercher..." oninput="renderL()"></div>
      <div class="ff" id="ff"></div>
      <div class="hl" id="hl"></div>
    </div>
    <div class="main" id="main">
      <div class="empty-state"><div class="ei">⚔</div><p>Sélectionne un héros</p><small>ou clique "+ Ajouter"</small></div>
    </div>
  </div>
</div>

<!-- MODAL: Créer une box -->
<div class="overlay" id="ov-create">
  <div class="modal">
    <h3>🎮 Créer une box</h3>
    <div class="mf">
      <label>Nom du joueur</label>
      <input type="text" id="box-name-input" placeholder="Ex: Mycs, Nams, Mon compte..." maxlength="20"
        onkeydown="if(event.key==='Enter')confirmCreateBox()">
    </div>
    <div class="mf">
      <label>Couleur</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="color-picker">
        <div class="color-opt" data-color="#ff6b35" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#ff6b35;cursor:pointer;border:3px solid #ff6b35"></div>
        <div class="color-opt" data-color="#4ecdc4" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#4ecdc4;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#bf7fff" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#bf7fff;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#ffd700" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#ffd700;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#3fb950" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#3fb950;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#f85149" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#f85149;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#58a6ff" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#58a6ff;cursor:pointer;border:3px solid transparent"></div>
      </div>
    </div>
    <div class="ma">
      <button class="bc" onclick="closeCreateBox()">Annuler</button>
      <button class="bo" onclick="confirmCreateBox()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL: Ajouter héros -->
<div class="overlay" id="ov">
  <div class="modal">
    <h3 id="mtit">Ajouter un héros</h3>
    <div class="mf">
      <label>Héros <span id="mcount" style="color:var(--text3);font-weight:400"></span></label>
      <input type="text" id="msearch" placeholder="Taper le nom du héros..." oninput="filterHeroes()" autocomplete="off"
        style="margin-bottom:6px;width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.4);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit">
      <select id="mh" size="5" style="height:130px;width:100%" onchange="onHeroChosen()"><option value="">— Cherche ci-dessus —</option></select>
      <div class="hint" id="mhint"></div>
    </div>
    <div class="mf"><label>Niveau EX</label>
      <select id="mex">
        <option value="-1">Non débloqué</option><option value="0" selected>+0 (débloqué)</option>
        <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option>
        <option value="4">+4</option><option value="5">+5</option><option value="6">+6</option>
        <option value="7">+7</option><option value="8">+8</option><option value="9">+9</option>
        <option value="10">+10</option><option value="11">+11</option><option value="12">+12</option>
        <option value="13">+13</option><option value="14">+14</option><option value="15">+15</option>
      </select>
    </div>
    <div class="mf"><label>Parangon</label>
      <select id="mpn">
        <option>Elite</option><option>Elite+</option><option>Epic</option><option>Epic+</option>
        <option>Légendaire</option><option>Légendaire+</option><option>Mythic</option><option>Mythic+</option>
        <option>Supreme</option><option>Supreme+</option><option>P1</option><option>P2</option><option>P3</option><option>P4</option>
      </select>
    </div>
    <div class="ma">
      <button class="bc" onclick="closeM()">Annuler</button>
      <button class="bo" id="mok" onclick="confirmA()">Ajouter</button>
    </div>
  </div>
</div>

<script>

// ── COLORS ──────────────────────────────────────────────────────
let pickedColor = '#ff6b35';

// ── TIER LIST ───────────────────────────────────────────────────
const TL={
"Shemira":{tier:"S",faction:"Mort-vivant",dr:0.5,stage:4.0,pvp:0.5,cat:"SHEMIRA",rank:1,role:"Mage",note:"Vol de vie massif, tank mage auto-sustain.",excap:15},
"Galahad":{tier:"S",faction:"Pugiliste",dr:0.0,stage:1.0,pvp:1.5,cat:"REQUIRED",rank:2,role:"Mage",note:"Carry magique PvE très puissant.",excap:15},
"Silven":{tier:"A",faction:"Porteur de lumière",dr:1.0,stage:0.5,pvp:2.3,cat:"REQUIRED",rank:3,role:"Archer",note:"REQUIRED rang 3. Fort PvP et support allié.",excap:10},
"Solise":{tier:"S",faction:"Sauvageon",dr:0.5,stage:1.5,pvp:1.0,cat:"REQUIRED",rank:4,role:"Soutien",note:"Soins + offensif, REQUIRED rang 4.",excap:10},
"Daimon":{tier:"S",faction:"Mort-vivant",dr:2.0,stage:3.0,pvp:0.65,cat:"REQUIRED",rank:5,role:"Tank",note:"Tank magique, dégâts zone puissants sur boss.",excap:10},
"Pandora":{tier:"S",faction:"Dimensionnel",dr:0.0,stage:4.0,pvp:0.0,cat:"REQUIRED",rank:6,role:"Soutien",note:"Dégâts zone, excellent stages.",excap:10},
"Cyran":{tier:"S",faction:"Porteur de lumière",dr:4.0,stage:1.5,pvp:0.0,cat:"High Impact",rank:7,role:"Archer",note:"Excellent DR Boss (4.0), très fort stages.",excap:0},
"Velara":{tier:"S",faction:"Sauvageon",dr:0.5,stage:-1.0,pvp:2.65,cat:"High Impact",rank:8,role:"Soutien",note:"Cercle d'affaiblissement, fort PvP.",excap:10},
"Ravion":{tier:"S",faction:"Sauvageon",dr:2.0,stage:4.0,pvp:1.5,cat
