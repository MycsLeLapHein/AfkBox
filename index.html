<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Journey — Box Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bg4:#21262d;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#ff6b35;--accent2:#4ecdc4;--purple:#bf7fff;
  --gold:#ffd700;--red:#f85149;--green:#3fb950;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:0}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap}
.topbar-sub{font-size:11px;color:var(--text3);white-space:nowrap}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.tbtn{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}

/* BOX TABS */
.box-tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.box-tab{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.box-tab:hover{border-color:var(--border2);color:var(--text)}
.box-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.1);font-weight:700}
.box-tab .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:rgba(255,107,53,.2);color:var(--accent)}
.box-tab.active .tab-del{display:inline-flex}
.tab-del{display:none;width:16px;height:16px;border-radius:50%;background:rgba(248,81,73,.2);color:var(--red);font-size:10px;align-items:center;justify-content:center;cursor:pointer;margin-left:2px}
.tab-del:hover{background:var(--red);color:#fff}
.add-box-btn{padding:6px 12px;border-radius:20px;border:2px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.add-box-btn:hover{border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 106px)}
.sidebar{width:290px;min-width:240px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;background:var(--bg)}

/* SIDEBAR */
.sidebar-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:rgba(255,107,53,.2);color:var(--accent)}
.sidebar-header h2{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hcount{font-size:11px;color:var(--text3);flex-shrink:0}
.add-btn{padding:5px 10px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.sw{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sw input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none}
.sw input:focus{border-color:var(--border2)}
.ff{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.fb{padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit}
.fb.on{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.hl{flex:1;overflow-y:auto;padding:6px 0}
.hi{padding:7px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.hi:hover{background:var(--bg3)}
.hi.sel{background:var(--bg3);border-left-color:var(--accent)}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hn{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0}
.ts{background:rgba(255,215,0,.15);color:var(--gold)}
.ta{background:rgba(78,205,196,.15);color:var(--accent2)}
.exb{font-size:10px;color:var(--accent);flex-shrink:0}

/* EMPTY STATES */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2);padding:20px;text-align:center}
.ei{font-size:48px;opacity:.25}
.empty-state p{font-size:14px}
.empty-state small{font-size:12px;color:var(--text3)}
.no-box{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 106px);gap:16px;color:var(--text2);text-align:center;padding:20px}
.no-box .big-icon{font-size:64px;opacity:.2}
.no-box h2{font-size:20px;font-weight:700;color:var(--text)}
.no-box p{font-size:14px;max-width:300px;line-height:1.6}
.create-box-btn{padding:12px 24px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.create-box-btn:hover{opacity:.85}

/* DETAIL */
.detail{padding:20px;max-width:680px}
.dh{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.dav{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;border:2px solid}
.di h2{font-size:20px;font-weight:700;margin-bottom:5px}
.di .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid transparent}
.bs{background:rgba(255,215,0,.12);color:var(--gold);border-color:rgba(255,215,0,.25)}
.ba{background:rgba(78,205,196,.12);color:var(--accent2);border-color:rgba(78,205,196,.25)}
.bf{background:var(--bg3);color:var(--text2);border-color:var(--border)}
.di .note{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.scl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.scv{font-size:18px;font-weight:700}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.sec h3{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sl{font-size:12px;color:var(--text2);width:90px;flex-shrink:0}
.st{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.sf{height:100%;border-radius:3px;transition:width .5s}
.sn{font-size:12px;font-weight:600;width:28px;text-align:right;flex-shrink:0}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ef{display:flex;flex-direction:column;gap:3px}
.ef label{font-size:11px;color:var(--text2)}
.ef select,.ef input{padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.ef select:focus,.ef input:focus{border-color:var(--border2)}
.ea{display:flex;gap:8px;margin-top:10px}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn:hover{opacity:.85}
.bsv{background:var(--green);color:#fff}
.bdl{background:transparent;color:var(--red);border:1px solid rgba(248,81,73,.3)}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.tt{font-size:13px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:4px}
.tm{font-size:11px;color:var(--text3)}
.td{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.thl{display:flex;flex-wrap:wrap;gap:5px}
.th{padding:4px 9px;border-radius:14px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}
.th.o{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}
.th.x{border:1px dashed var(--border);color:var(--text3)}
.aiw{background:var(--bg2);border:1px solid rgba(191,127,255,.25);border-radius:10px;padding:14px;margin-bottom:12px}
.aiw h3{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}
.air{display:flex;gap:7px}
.air input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.3);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.air input:focus{border-color:var(--purple)}
.air button{padding:7px 14px;border-radius:6px;border:none;background:var(--purple);color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.ail{font-size:13px;color:var(--text2);padding:8px 0;display:none}
.airesp{margin-top:10px;font-size:13px;line-height:1.7;color:var(--text);background:var(--bg3);border-radius:6px;padding:12px;white-space:pre-wrap;display:none}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;width:360px;max-width:94vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.mf select,.mf input[type=text]{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.mf select:focus,.mf input:focus{border-color:var(--border2)}
.hint{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6}
.ma{display:flex;gap:8px;margin-top:14px}
.bc{background:transparent;color:var(--text2);border:1px solid var(--border);font-family:inherit;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.bo{background:var(--accent);color:#fff;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.bo:hover{opacity:.85}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Mobile touch fixes */
button{-webkit-tap-highlight-color:rgba(255,107,53,.2);touch-action:manipulation;cursor:pointer}
.hi{-webkit-tap-highlight-color:rgba(255,255,255,.05);touch-action:manipulation}
.box-tab{-webkit-tap-highlight-color:rgba(255,107,53,.2);touch-action:manipulation}
.add-box-btn{-webkit-tap-highlight-color:rgba(255,107,53,.2);touch-action:manipulation}
* {-webkit-tap-highlight-color:transparent}
button, .hi, .box-tab, .add-box-btn, .fb, .tbtn, .color-opt {touch-action:manipulation}

/* MOBILE */
@media(max-width:768px){
  .topbar{padding:8px 12px}
  .topbar-sub{display:none}
  .topbar-logo{font-size:13px}
  .tbtn span{display:none}
  .box-tabs-wrap{padding:6px 10px;gap:5px}
  .box-tab{padding:5px 10px;font-size:12px}
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 110px)}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);max-height:42vh}
  .main{flex:1;min-height:50vh}
  .detail{padding:12px}
  .dh{gap:10px;margin-bottom:14px}
  .dav{width:44px;height:44px;font-size:15px}
  .di h2{font-size:16px}
  .sg{grid-template-columns:1fr 1fr;gap:6px}
  .sc{padding:8px}.scv{font-size:16px}
  .sec{padding:10px;margin-bottom:10px}
  .eg{grid-template-columns:1fr 1fr;gap:6px}
  .ef select,.ef input{font-size:12px;padding:6px 8px}
  .btn{padding:6px 10px;font-size:12px}
  .tc{padding:10px}
  .th{font-size:10px;padding:3px 7px}
  .modal{width:94vw;padding:16px}
  #mh{height:110px}
  .no-box{height:calc(100vh - 110px)}
}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-logo">⚔ AFK Journey</div>
    <div class="topbar-sub">Box Manager</div>
  </div>
  <div class="topbar-right">
    <button class="tbtn" onclick="exportBox()">☁ <span>Export</span></button>
    <button class="tbtn" onclick="document.getElementById('import-input').click()">📥 <span>Import</span></button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importBox(event)">
  </div>
</div>

<!-- BOX TABS -->
<div class="box-tabs-wrap" id="box-tabs">
  <button class="add-box-btn" onclick="openCreateBox()">+ Ajouter une box</button>
</div>

<!-- LAYOUT vide (sans box) -->
<div class="layout" id="layout">
  <div class="no-box" id="no-box-state">
    <div class="big-icon">📦</div>
    <h2>Aucune box</h2>
    <p>Crée ta première box pour commencer à gérer tes héros !</p>
    <button class="create-box-btn" onclick="openCreateBox()">+ Créer une box</button>
  </div>
</div>

<!-- SIDEBAR + MAIN (affiché quand une box existe) -->
<div id="sidebar-wrap" style="display:none">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sav" id="sav">?</div>
        <h2 id="stit">Ma Box</h2>
        <span class="hcount" id="hcnt"></span>
        <button class="add-btn" onclick="openM()">+ Ajouter</button>
      </div>
      <div class="sw">
        <input type="text" id="srch" placeholder="Rechercher..." oninput="renderL()">
      </div>
      <div style="padding:6px 14px;border-bottom:1px solid var(--border)">
        <button onclick="showExPriority()" style="width:100%;padding:7px;border-radius:6px;border:1px solid var(--gold);background:rgba(255,215,0,.08);color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600">
          Priorités EX
        </button>
      </div>
      <div class="ff" id="ff"></div>
      <div class="hl" id="hl"></div>
    </div>
    <div class="main" id="main">
      <div class="empty-state"><div class="ei">⚔</div><p>Sélectionne un héros</p><small>ou clique "+ Ajouter"</small></div>
    </div>
  </div>
</div>

<!-- MODAL: Créer une box -->
<div class="overlay" id="ov-create">
  <div class="modal">
    <h3>🎮 Créer une box</h3>
    <div class="mf">
      <label>Nom du joueur</label>
      <input type="text" id="box-name-input" placeholder="Ex: Mycs, Nams, Mon compte..." maxlength="20"
        onkeydown="if(event.key==='Enter')confirmCreateBox()">
    </div>
    <div class="mf">
      <label>Couleur</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="color-picker">
        <div class="color-opt" data-color="#ff6b35" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#ff6b35;cursor:pointer;border:3px solid #ff6b35"></div>
        <div class="color-opt" data-color="#4ecdc4" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#4ecdc4;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#bf7fff" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#bf7fff;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#ffd700" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#ffd700;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#3fb950" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#3fb950;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#f85149" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#f85149;cursor:pointer;border:3px solid transparent"></div>
        <div class="color-opt" data-color="#58a6ff" onclick="pickColor(this)" style="width:28px;height:28px;border-radius:50%;background:#58a6ff;cursor:pointer;border:3px solid transparent"></div>
      </div>
    </div>
    <div class="ma">
      <button class="bc" onclick="closeCreateBox()">Annuler</button>
      <button class="bo" onclick="confirmCreateBox()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL: Ajouter héros -->
<div class="overlay" id="ov">
  <div class="modal">
    <h3 id="mtit">Ajouter un héros</h3>
    <div class="mf">
      <label>Héros <span id="mcount" style="color:var(--text3);font-weight:400"></span></label>
      <input type="text" id="msearch" placeholder="Taper le nom du héros..." oninput="filterHeroes()" autocomplete="off"
        style="margin-bottom:6px;width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.4);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit">
      <select id="mh" size="5" style="height:130px;width:100%" onchange="onHeroChosen()"><option value="">— Cherche ci-dessus —</option></select>
      <div class="hint" id="mhint"></div>
    </div>
    <div class="mf"><label>Niveau EX</label>
      <select id="mex">
        <option value="-1">Non débloqué</option><option value="0" selected>+0 (débloqué)</option>
        <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option>
        <option value="4">+4</option><option value="5">+5</option><option value="6">+6</option>
        <option value="7">+7</option><option value="8">+8</option><option value="9">+9</option>
        <option value="10">+10</option><option value="11">+11</option><option value="12">+12</option>
        <option value="13">+13</option><option value="14">+14</option><option value="15">+15</option>
      </select>
    </div>
    <div class="mf"><label>Parangon</label>
      <select id="mpn">
        <option>Elite</option><option>Elite+</option><option>Epic</option><option>Epic+</option>
        <option>Légendaire</option><option>Légendaire+</option><option>Mythic</option><option>Mythic+</option>
        <option>Supreme</option><option>Supreme+</option><option>P1</option><option>P2</option><option>P3</option><option>P4</option>
      </select>
    </div>
    <div class="ma">
      <button class="bc" onclick="closeM()">Annuler</button>
      <button class="bo" id="mok" onclick="confirmA()">Ajouter</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// heroes.js — Base de données des héros AFK Journey
// Modifie ce fichier pour ajouter/supprimer des héros
// ═══════════════════════════════════════════════════════

const TL={
"Shemira":{tier:"S",faction:"Mort-vivant",dr:0.5,stage:4.0,pvp:0.5,cat:"SHEMIRA",rank:1,role:"Mage",note:"Vol de vie massif, tank mage auto-sustain.",excap:15,p10:1,p15:7},
"Galahad":{tier:"S",faction:"Pugiliste",dr:0.0,stage:1.0,pvp:1.5,cat:"REQUIRED",rank:2,role:"Mage",note:"Carry magique PvE très puissant.",excap:15,p10:1,p15:8},
"Silven":{tier:"A",faction:"Porteur de lumière",dr:0.5,stage:0.5,pvp:2.3,cat:"REQUIRED",rank:3,role:"Archer",note:"REQUIRED rang 3. Fort PvP et support allié.",excap:10,p10:1,p15:6},
"Solise":{tier:"S",faction:"Sauvageon",dr:0.5,stage:1.5,pvp:1.0,cat:"REQUIRED",rank:4,role:"Soutien",note:"Soins + offensif, REQUIRED rang 4.",excap:10,p10:3,p15:7},

// ── GÉNÉRATEUR D'ÉQUIPES PAR DÉFAUT ─────────────────────────────
// Utilisé pour les héros sans synergie définie
// Règle méta : 1 Tank + 1 Soutien + 3 DPS
function getTeams(n, p) {
  if (SYN[n]) return SYN[n];

  const box = state.boxes.find(b => b.id === p);
  if (!box) return [];
  const bnames = box.heroes.map(b => b.name);

  // Pick best tank from box (by rank)
  const tanks = bnames.filter(x => x !== n && TL[x]?.role === 'Tank')
    .sort((a, b) => TL[a].rank - TL[b].rank);
  // Pick best soutien from box
  const soutiens = bnames.filter(x => x !== n && TL[x]?.role === 'Soutien')
    .sort((a, b) => TL[a].rank - TL[b].rank);
  // DPS = Mage, Archer, Assassin, Guerrier
  const dps = bnames.filter(x => x !== n && ['Mage','Archer','Assassin','Guerrier'].includes(TL[x]?.role))
    .sort((a, b) => TL[a].rank - TL[b].rank);
  // High DR dps
  const drDps = bnames.filter(x => x !== n && TL[x]?.dr >= 2.5)
    .sort((a, b) => TL[b].dr - TL[a].dr);

  // Team 1: Story Stages
  const t1 = [n];
  const myRole = TL[n]?.role;
  if (myRole !== 'Tank' && tanks.length) t1.push(tanks[0]);
  if (myRole !== 'Soutien' && soutiens.length && t1.length < 5) t1.push(soutiens[0]);
  for (const d of dps) { if (t1.length >= 5) break; if (!t1.includes(d)) t1.push(d); }

  // Team 2: Dream Realm
  const t2 = [n];
  if (myRole !== 'Tank' && tanks.length) t2.push(tanks[0]);
  if (myRole !== 'Soutien' && soutiens.length && t2.length < 5) t2.push(soutiens[0]);
  for (const d of drDps) { if (t2.length >= 5) break; if (!t2.includes(d)) t2.push(d); }

  return [
    {
      name: "Équipe Équilibrée (1T + 1S + 3DPS)",
      heroes: t1,
      desc: "Composition méta : 1 Tank en protection, 1 Soutien pour les soins/buffs, 3 DPS pour les dégâts. Adaptée stages et boss.",
      mode: "Story Stages"
    },
    {
      name: "Équipe Dream Realm (DR optimisé)",
      heroes: t2,
      desc: "1 Tank + 1 Soutien + les meilleurs scores DR de ta box. Maximise les dégâts sur les boss Dream Realm.",
      mode: "Dream Realm"
    },
  ];
}

// ── PRIORITÉS EX ─────────────────────────────────────────────────
function showExPriority() {
  const box = getActiveBox();
  if (!box) return;

  // Get heroes from box that have EX data
  const heroes = box.heroes.map(h => {
    const t = TL[h.name] || {};
    return {
      name: h.name,
      currentEx: h.ex,
      cap: t.excap,
      p10: t.p10,
      p15: t.p15,
      tier: t.tier,
      cat: t.cat,
    };
  }).filter(h => h.p10 !== undefined);

  // Sort priority for +10: heroes not yet at +10, sorted by p10 score (lower = more urgent)
  const need10 = heroes
    .filter(h => h.currentEx < 10 && h.cap >= 10 && h.p10 > 0)
    .sort((a, b) => a.p10 - b.p10 || a.cap - b.cap);

  // Sort priority for +15: heroes not yet at +15, cap=15, sorted by p15 score (higher = more gain)
  const need15 = heroes
    .filter(h => h.currentEx < 15 && h.cap === 15 && h.p15 >= 5)
    .sort((a, b) => b.p15 - a.p15 || a.p10 - b.p10);

  // Already done
  const done = heroes.filter(h => h.currentEx >= h.cap && h.cap > 0);

  const box_color = box.color || 'var(--accent)';
  const catColors = {"SHEMIRA":"#ff0055","REQUIRED":"#ff4444","High Impact":"#ff8c00",
    "Nice to Have":"#ffd700","Niche":"#7ec8e3","Stretch":"#6e7681","Céleste/Hypogéen":"#bf7fff",
    "Collab":"#3fb950","Skip":"#555"};

  function heroRow(h, showCap) {

    const progress = h.cap > 0 ? Math.min(100, (h.currentEx / h.cap) * 100) : 0;
    const exLabel = h.currentEx === -1 ? 'Non débloqué' : h.currentEx === 0 ? '+0' : '+' + h.currentEx;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg3);margin-bottom:6px">

          ${h.tier ? `<span style="font-size:10px;font-weight:700;color:${h.tier==='S'?'var(--gold)':'var(--accent2)'}">${h.tier}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${progress.toFixed(0)}%;background:${box_color};border-radius:2px;transition:width .3s"></div>
          </div>
          <span style="font-size:11px;color:var(--text2);flex-shrink:0">${exLabel} → <strong style="color:${box_color}">+${h.cap}</strong></span>
        </div>
      </div>
    </div>`;
  }

  const html = `<div class="detail">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <div style="font-size:24px">⭐</div>
      <div>
        <h2 style="font-size:18px;font-weight:700">Priorités EX — ${box.name}</h2>
        <p style="font-size:12px;color:var(--text2);margin-top:2px">Basé sur ta tier list de référence (Apr 2026)</p>
      </div>
    </div>

    ${need10.length > 0 ? `
    <div class="sec">
      <h3 style="color:var(--gold)">🎯 À monter à EX+10 en priorité (${Math.min(need10.length, 10)}/${need10.length})</h3>
      <p style="font-size:11px;color:var(--text2);margin-bottom:10px">Score bas = plus urgent · basé sur l'importance du héros dans la méta</p>
      ${need10.slice(0, 10).map(h => heroRow(h, true)).join('')}
      ${need10.length > 10 ? `<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">+ ${need10.length - 10} autres héros...</p>` : ''}
    </div>` : ''}

    ${need15.length > 0 ? `
    <div class="sec">
      <h3 style="color:#3fb950">⭐ À monter à EX+15 en priorité (${Math.min(need15.length, 10)}/${need15.length})</h3>
      <p style="font-size:11px;color:var(--text2);margin-bottom:10px">Score haut = plus de gain entre +10 et +15</p>
      ${need15.slice(0, 10).map(h => heroRow(h, true)).join('')}
      ${need15.length > 10 ? `<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">+ ${need15.length - 10} autres héros...</p>` : ''}
    </div>` : ''}

    ${done.length > 0 ? `
    <div class="sec">
      <h3 style="color:var(--green)">✓ Caps atteints (${done.length})</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
        ${done.map(h => `<span style="padding:3px 10px;border-radius:12px;background:rgba(63,185,80,.12);color:var(--green);font-size:12px;border:1px solid rgba(63,185,80,.3)">✓ ${h.name} +${h.currentEx}</span>`).join('')}
      </div>
    </div>` : ''}

    ${need10.length === 0 && need15.length === 0 ? `
    <div style="text-align:center;padding:40px;color:var(--text2)">
      <div style="font-size:48px;opacity:.3">🎉</div>
      <p style="margin-top:12px">Tous les caps EX sont atteints !</p>
    </div>` : ''}
  </div>`;

  document.getElementById('main').innerHTML = html;
  selHero = null;
  renderL();
}

// ── BOX TABS ────────────────────────────────────────────────────
function renderTabs(){
  const wrap=document.getElementById('box-tabs');
  const tabs=state.boxes.map(b=>{
    const active=b.id===state.activeId;
    const initial=b.name.slice(0,1).toUpperCase();
    return `<button class="box-tab${active?' active':''}" data-boxid="${b.id}" data-action="switch">
      <div class="av" style="background:${b.color}22;color:${b.color}">${initial}</div>
      ${b.name}
      <span class="tab-del" data-boxid="${b.id}" data-action="delete">✕</span>
    </button>`;
  }).join('');
  wrap.innerHTML=tabs+'<button class="add-box-btn" data-action="create">+ Ajouter une box</button>';
  const hasBoxes=state.boxes.length>0;
  document.getElementById('layout').style.display=hasBoxes?'none':'flex';
  document.getElementById('sidebar-wrap').style.display=hasBoxes?'block':'none';
}

// Central click/touch handler for box tabs
document.getElementById('box-tabs').addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const action=btn.dataset.action;
  const id=btn.dataset.boxid;
  if(action==='switch')switchBox(id);
  else if(action==='delete')deleteBox(e,id);
  else if(action==='create')openCreateBox();
});

function switchBox(id){
  state.activeId=id;selHero=null;faction='all';
  document.getElementById('srch').value='';
  document.getElementById('main').innerHTML='<div class="empty-state"><div class="ei">⚔</div><p>Sélectionne un héros</p><small>ou clique "+ Ajouter"</small></div>';
  saveState();renderTabs();renderSidebar();
}

function deleteBox(e,id){
  e.stopPropagation();
  const box=state.boxes.find(b=>b.id===id);
  if(!box)return;
  if(!confirm('Supprimer la box "'+box.name+'" et tous ses héros ?'))return;
  state.boxes=state.boxes.filter(b=>b.id!==id);
  if(state.activeId===id)state.activeId=state.boxes.length>0?state.boxes[0].id:null;
  selHero=null;saveState();renderTabs();
  if(getActiveBox())renderSidebar();
}

// ── CREATE BOX ──────────────────────────────────────────────────
function openCreateBox(){
  pickedColor='#ff6b35';
  document.querySelectorAll('.color-opt').forEach(el=>{
    el.style.border=el.dataset.color===pickedColor?'3px solid white':'3px solid transparent';
  });
  document.getElementById('box-name-input').value='';
  document.getElementById('ov-create').style.display='flex';
  setTimeout(()=>document.getElementById('box-name-input').focus(),100);
}
function closeCreateBox(){document.getElementById('ov-create').style.display='none';}
function pickColor(el){
  pickedColor=el.dataset.color;
  document.querySelectorAll('.color-opt').forEach(e=>{
    e.style.border=e.dataset.color===pickedColor?'3px solid white':'3px solid transparent';
  });
}
function confirmCreateBox(){
  const name=document.getElementById('box-name-input').value.trim();
  if(!name){alert('Entre un nom !');return;}
  const id='box_'+Date.now();

}

// ── SIDEBAR ─────────────────────────────────────────────────────
function renderSidebar(){
  const box=getActiveBox();if(!box)return;
  document.getElementById('sav').textContent=box.name.slice(0,1).toUpperCase();
  document.getElementById('sav').style.background=box.color+'22';
  document.getElementById('sav').style.color=box.color;
  document.getElementById('stit').textContent='Box de '+box.name;
  document.getElementById('hcnt').textContent=box.heroes.length+' héros';
  const facs=['all',...new Set(box.heroes.map(h=>TL[h.name]?.faction).filter(Boolean))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b));
  document.getElementById('ff').innerHTML=facs.map(f=>`<button class="fb${faction===f?' on':''}" data-fac="${f}">${f==='all'?'Tous':f}</button>`).join('');
  document.getElementById('ff').onclick=function(e){
    const btn=e.target.closest('[data-fac]');
    if(btn)setF(btn.dataset.fac);
  };
  renderL();
}

function renderL(){
  const box=getActiveBox();if(!box)return;
  const q=document.getElementById('srch').value.toLowerCase();
  let items=box.heroes.filter(h=>{
    if(q&&!h.name.toLowerCase().includes(q))return false;
    if(faction!=='all'&&TL[h.name]?.faction!==faction)return false;
    return true;
  }).sort((a,b)=>{
    const ta=TL[a.name],tb=TL[b.name];
    if(!ta&&!tb)return 0;if(!ta)return 1;if(!tb)return-1;
    return ta.rank-tb.rank;
  });
  const el=document.getElementById('hl');
  if(!items.length){
    el.innerHTML=`<div style="padding:20px 14px;text-align:center;color:var(--text3);font-size:13px">${box.heroes.length===0?'Box vide — clique "+ Ajouter"':'Aucun résultat'}</div>`;
    return;
  }
  el.innerHTML=items.map(h=>{
    const t=TL[h.name]||{};const c=cc(t.cat||'');const s=selHero===h.name;
    const safe=h.name.replace(/'/g,"&#39;");
    return`<div class="hi${s?' sel':''}" data-name="${safe}">
      <div class="hdot" style="background:${c}"></div>
      <span class="hn">${h.name}</span>
      ${t.tier?`<span class="tb ${t.tier==='S'?'ts':'ta'}">${t.tier}</span>`:''}
      ${h.ex>0?`<span class="exb">+${h.ex}</span>`:''}
    </div>`;
  }).join('');
  // Use event delegation for hero clicks
  el.onclick=function(e){
    const item=e.target.closest('[data-name]');
    if(item)selH(item.dataset.name);
  };
}

function setF(f){faction=f;renderSidebar();}

// ── HERO DETAIL ──────────────────────────────────────────────────

  else if(excap===0){exCapLabel='EX non prioritaire';exCapColor='#8b949e';exCapIcon='◦';}
  else if(excap===10){exCapLabel='Cap recommandé : +10';exCapColor='#ffd700';exCapIcon='🎯';}
  else if(excap===15){exCapLabel='Cap recommandé : +15';exCapColor='#3fb950';exCapIcon='⭐';}

  document.getElementById('main').innerHTML=`<div class="detail">
    <div class="dh">
      <div class="dav" style="background:${c}22;border-color:${c}55;color:${c}">${name.slice(0,2).toUpperCase()}</div>
      <div class="di">
        <h2>${name}</h2>
        <div class="meta">
          ${t.tier?`<span class="badge ${t.tier==='S'?'bs':'ba'}">${t.tier}</span>`:''}
          ${t.faction?`<span class="badge bf">${t.faction}</span>`:''}
          ${t.role?`<span class="badge bf">${roleIcon[t.role]||''} ${t.role}</span>`:''}
          ${t.cat?`<span class="badge" style="background:${c}18;color:${c};border-color:${c}44">${t.cat}</span>`:''}
          <span style="font-size:11px;color:var(--text3)">Rang #${t.rank||'?'}</span>
        </div>
        ${t.note?`<div class="note">${t.note}</div>`:''}
      </div>
    </div>
    <div class="sg">
      <div class="sc">
        <div class="scl">EX Level</div>
        <div class="scv" id="ex-label-card" style="color:${ac};font-size:15px">${exLabel}</div>
        <div id="ex-progress-wrap" style="margin-top:5px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;display:${excap>0?'block':'none'}">

        <button class="btn bsv" data-hero="${name}" onclick="sv(this.dataset.hero)">✓ Sauvegarder</button>
        <button class="btn bdl" data-hero="${name}" onclick="dl(this.dataset.hero)">Supprimer</button>

function ed(f,v,n){
  const box=getActiveBox();if(!box)return;
  const h=box.heroes.find(h=>h.name===n);if(!h)return;
  if(f==='ex')h.ex=parseInt(v);else h[f]=v;
  saveState();
}
function sv(n){
  saveState();renderL();
  const b=document.querySelector('.bsv');
  if(b){b.textContent='✓ Sauvegardé !';setTimeout(()=>b.textContent='✓ Sauvegarder',1500);}
}
function dl(n){
  if(!confirm('Supprimer '+n+' ?'))return;
  const box=getActiveBox();if(!box)return;
  box.heroes=box.heroes.filter(h=>h.name!==n);
  saveState();selHero=null;
  document.getElementById('main').innerHTML='<div class="empty-state"><div class="ei">⚔</div><p>Héros supprimé</p></div>';
  renderSidebar();
}

// ── ADD HERO ─────────────────────────────────────────────────────
let modalAvail=[];
function openM(){
  const box=getActiveBox();if(!box)return;
  const owned=box.heroes.map(h=>h.name);
  modalAvail=Object.keys(TL).filter(n=>!owned.includes(n)).sort((a,b)=>TL[a].rank-TL[b].rank);

function buildHeroOptions(list){

  sel.innerHTML=list.map(n=>{

function filterHeroes(){

}
function onHeroChosen(){
  const n=document.getElementById('mh').value;const t=TL[n];
  const hint=document.getElementById('mhint');
  if(n&&t){
    const capLabel=t.excap===0?'EX non prioritaire':t.excap===-1?"Pas d'EX":t.excap?'Cap EX : +'+t.excap:'?';

  }else{hint.textContent='';}
}
function closeM(){document.getElementById('ov').style.display='none';}
function confirmA(){
  const n=document.getElementById('mh').value;
  if(!n){alert('Choisis un héros !');return;}
  const ex=parseInt(document.getElementById('mex').value);
  const pn=document.getElementById('mpn').value;

  if(box.heroes.find(h=>h.name===n)){alert('Déjà dans la box !');return;}

  saveState();closeM();renderSidebar();selH(n);
}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeM();});
document.getElementById('ov-create').addEventListener('click',e=>{if(e.target===document.getElementById('ov-create'))closeCreateBox();});

// ── EXPORT / IMPORT ──────────────────────────────────────────────
function exportBox(){
  const data={version:3,date:new Date().toISOString(),boxes:state.boxes};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='afk-box-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(url);
}
function importBox(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.boxes){
        state.boxes=data.boxes;
        state.activeId=data.boxes.length>0?data.boxes[0].id:null;
      }else if(data.mycs||data.nams){
        state.boxes=[];
        if(data.mycs&&data.mycs.length){
          const id='box_'+Date.now();
          state.boxes.push({id,name:'Mycs',color:'#ff6b35',heroes:data.mycs});
          state.activeId=id;
        }
        if(data.nams&&data.nams.length){
          const id='box_'+(Date.now()+1);
          state.boxes.push({id,name:'Nams',color:'#4ecdc4',heroes:data.nams});
          if(!state.activeId)state.activeId=id;
        }
      }else{throw new Error('Format invalide');}
      saveState();selHero=null;renderTabs();
      if(getActiveBox())renderSidebar();
      const total=state.boxes.reduce((s,b)=>s+b.heroes.length,0);
      alert('Import réussi ! '+state.boxes.length+' box(es) · '+total+' héros');
    }catch(err){alert('Erreur : '+err.message);}
    event.target.value='';
  };
  reader.readAsText(file);
}

// ── EX LIVE UPDATE ───────────────────────────────────────────────
function updateExCard(rawVal,heroName){
  const val=parseInt(rawVal);
  const t=TL[heroName]||{};
  const excap=t.excap;
  const box=getActiveBox();
  const ac=box?box.color:'var(--accent)';
  const label=val===-1?'Non débloqué':val===0?'+0 (débloqué)':('+'+val);
  const labelEl=document.getElementById('ex-label-card');
  if(labelEl)labelEl.textContent=label;
  const progress=(excap>0&&val>0)?Math.min(100,val/excap*100):0;
  const done=excap>0&&val>=excap;
  const barWrap=document.getElementById('ex-progress-wrap');
  const bar=document.getElementById('ex-progress-bar');
  if(barWrap)barWrap.style.display=excap>0?'block':'none';
  if(bar){bar.style.width=progress.toFixed(0)+'%';bar.style.background=done?'#3fb950':ac;}
  let capLabel,capColor,capIcon;
  if(excap===undefined||excap===null){capLabel='Cap : +10';capColor='#ffd700';capIcon='🎯';}
  else if(excap===-1){capLabel="Pas d'EX recommandé";capColor='#6e7681';capIcon='⊘';}
  else if(excap===0){capLabel='EX non prioritaire';capColor='#8b949e';capIcon='◦';}
  else if(excap===10){capLabel='Cap recommandé : +10';capColor='#ffd700';capIcon='🎯';}
  else if(excap===15){capLabel='Cap recommandé : +15';capColor='#3fb950';capIcon='⭐';}
  else{capLabel='Cap : +'+excap;capColor='#ffd700';capIcon='🎯';}
  if(done&&excap>0){capLabel='✓ Cap atteint !';capColor='#3fb950';capIcon='🎉';}
  const capEl=document.getElementById('ex-cap-label');
  if(capEl){capEl.textContent=capIcon+' '+capLabel;capEl.style.color=capColor;}
}

// ── AI ───────────────────────────────────────────────────────────
async function ai(nm){
  const q=document.getElementById('aiq')?.value?.trim();if(!q)return;
  const L=document.getElementById('ail'),R=document.getElementById('air2');
  L.style.display='';R.style.display='none';
  const box=getActiveBox();
  const sum=box?box.heroes.slice(0,25).map(h=>h.name+'(EX+'+h.ex+','+h.pn+')').join(', '):'';
  const t=TL[nm]||{};
  const prompt='Tu es un expert AFK Journey. Héros : '+nm+' (Tier '+t.tier+', '+t.faction+', DR:'+t.dr+', Stage:'+t.stage+'). Box : '+sum+'. Question : '+q+'. Réponds en français, max 200 mots.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await res.json();
    R.textContent=d.content?.map(b=>b.text||'').join('')||'Erreur.';R.style.display='';
  }catch(e){R.textContent='Erreur de connexion.';R.style.display='';}
  L.style.display='none';
}

// ── INIT ─────────────────────────────────────────────────────────
renderTabs();
if(getActiveBox())renderSidebar();

</script>
