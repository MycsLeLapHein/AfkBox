<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Journey — Box Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bg4:#21262d;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#ff6b35;--accent2:#4ecdc4;--purple:#bf7fff;
  --gold:#ffd700;--red:#f85149;--green:#3fb950;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap}
.topbar-sub{font-size:11px;color:var(--text3)}
.profile-tabs{flex:1;display:flex;justify-content:center;gap:8px}
.ptab{padding:8px 32px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:8px}
.ptab .av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.ptab.active-mycs{background:rgba(255,107,53,.15);border-color:var(--accent);color:var(--accent)}
.ptab.active-nams{background:rgba(78,205,196,.15);border-color:var(--accent2);color:var(--accent2)}
.ptab:not(.active-mycs):not(.active-nams):hover{border-color:var(--border2);color:var(--text)}
.layout{display:flex;height:calc(100vh - 54px)}
.sidebar{width:290px;min-width:240px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-m{background:rgba(255,107,53,.2);color:var(--accent)}
.av-n{background:rgba(78,205,196,.2);color:var(--accent2)}
.sidebar-header h2{font-size:14px;font-weight:600;flex:1}
.hcount{font-size:11px;color:var(--text3);margin-right:2px}
.add-btn{padding:5px 10px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.add-btn.n:hover{border-color:var(--accent2);color:var(--accent2)}
.sw{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sw input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none}
.sw input:focus{border-color:var(--border2)}
.ff{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.fb{padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit}
.fb.on{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.hl{flex:1;overflow-y:auto;padding:6px 0}
.hi{padding:6px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.hi:hover{background:var(--bg3)}
.hi.sm{background:var(--bg3);border-left-color:var(--accent)}
.hi.sn{background:var(--bg3);border-left-color:var(--accent2)}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hn{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0}
.ts{background:rgba(255,215,0,.15);color:var(--gold)}
.ta{background:rgba(78,205,196,.15);color:var(--accent2)}
.exb{font-size:10px;color:var(--accent);flex-shrink:0}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2)}
.ei{font-size:52px;opacity:.25}
.empty-state p{font-size:14px}
.empty-state small{font-size:12px;color:var(--text3)}
.detail{padding:22px;max-width:680px}
.dh{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
.dav{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;border:2px solid}
.di h2{font-size:20px;font-weight:700;margin-bottom:5px}
.di .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid transparent}
.bs{background:rgba(255,215,0,.12);color:var(--gold);border-color:rgba(255,215,0,.25)}
.ba{background:rgba(78,205,196,.12);color:var(--accent2);border-color:rgba(78,205,196,.25)}
.bf{background:var(--bg3);color:var(--text2);border-color:var(--border)}
.di .note{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.scl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.scv{font-size:19px;font-weight:700}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.sec h3{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:1.5px}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.sl{font-size:12px;color:var(--text2);width:100px;flex-shrink:0}
.st{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.sf{height:100%;border-radius:3px;transition:width .5s}
.sn{font-size:12px;font-weight:600;width:28px;text-align:right;flex-shrink:0}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ef{display:flex;flex-direction:column;gap:3px}
.ef label{font-size:11px;color:var(--text2)}
.ef select,.ef input{padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.ef select:focus,.ef input:focus{border-color:var(--border2)}
.ea{display:flex;gap:8px;margin-top:10px}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.bsv{background:var(--green);color:#fff}
.bdl{background:transparent;color:var(--red);border:1px solid rgba(248,81,73,.3)}
.bdl:hover{background:rgba(248,81,73,.08)}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px}
.tt{font-size:13px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:4px}
.tm{font-size:11px;color:var(--text3)}
.td{font-size:12px;color:var(--text2);margin-bottom:9px;line-height:1.5}
.thl{display:flex;flex-wrap:wrap;gap:6px}
.th{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
.th.o{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}
.th.x{border:1px dashed var(--border);color:var(--text3)}
.aiw{background:var(--bg2);border:1px solid rgba(191,127,255,.25);border-radius:10px;padding:14px;margin-bottom:14px}
.aiw h3{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}
.air{display:flex;gap:7px}
.air input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.3);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.air input:focus{border-color:var(--purple)}
.air button{padding:7px 14px;border-radius:6px;border:none;background:var(--purple);color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.ail{font-size:13px;color:var(--text2);padding:8px 0;display:none}
.airesp{margin-top:10px;font-size:13px;line-height:1.7;color:var(--text);background:var(--bg3);border-radius:6px;padding:12px;white-space:pre-wrap;display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:22px;width:380px;max-width:94vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.mf{margin-bottom:11px}
.mf label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.mf select,.mf input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.mf select:focus,.mf input:focus{border-color:var(--border2)}
.mf .hint{font-size:11px;color:var(--text3);margin-top:3px}
.ma{display:flex;gap:8px;margin-top:14px}
.bc{background:transparent;color:var(--text2);border:1px solid var(--border);font-family:inherit}
.bo{background:var(--accent);color:#fff}
.bon{background:var(--accent2);color:#fff}
#msearch{width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.4);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
#msearch:focus{border-color:var(--purple)}
.hint{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  .topbar{padding:8px 12px;gap:8px}
  .topbar-logo{font-size:13px}
  .topbar-sub{display:none}
  .profile-tabs{gap:6px}
  .ptab{padding:6px 14px;font-size:12px}
  .ptab .av{width:20px;height:20px;font-size:10px}
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 50px)}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);max-height:45vh;overflow-y:auto}
  .main{flex:1;min-height:55vh;overflow-y:auto}
  .sidebar-header{padding:10px 12px}
  .sidebar-header h2{font-size:13px}
  .sw{padding:8px 12px}
  .ff{padding:6px 12px;gap:4px}
  .fb{font-size:10px;padding:2px 7px}
  .hi{padding:7px 12px;gap:8px}
  .hn{font-size:12px}
  .detail{padding:14px}
  .dh{gap:10px;margin-bottom:16px}
  .dav{width:44px;height:44px;font-size:15px;border-radius:10px}
  .di h2{font-size:17px}
  .sg{grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
  .sc{padding:8px}
  .scl{font-size:9px}
  .scv{font-size:16px}
  .sec{padding:12px;margin-bottom:12px}
  .sec h3{font-size:10px;margin-bottom:10px}
  .sr{gap:8px;margin-bottom:6px}
  .sl{font-size:11px;width:80px}
  .sn{font-size:11px}
  .eg{grid-template-columns:1fr 1fr;gap:6px}
  .ef label{font-size:10px}
  .ef select,.ef input{padding:6px 8px;font-size:12px}
  .ea{margin-top:8px;gap:6px}
  .btn{padding:6px 12px;font-size:12px}
  .tc{padding:10px;margin-bottom:8px}
  .tt{font-size:12px}
  .td{font-size:11px;margin-bottom:7px}
  .th{font-size:11px;padding:3px 8px}
  .aiw{padding:12px}
  .air input{font-size:12px;padding:6px 8px}
  .air button{padding:6px 12px;font-size:12px}
  .modal{width:92vw;padding:16px}
  .modal h3{font-size:14px}
  .mf select,.mf input{font-size:12px;padding:7px 8px}
  #msearch{font-size:12px;padding:7px 8px}
  #mh{height:110px}
  .ma{gap:6px}
  /* Export/Import buttons smaller on mobile */
  .topbar > div:last-child button{padding:5px 8px;font-size:11px}
  .topbar > div:last-child button span{display:none}
}

@media (max-width: 400px) {
  .ptab{padding:5px 10px;font-size:11px}
  .di h2{font-size:15px}
  .sg{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="topbar">
  <div><div class="topbar-logo">⚔ AFK Journey</div><div class="topbar-sub">Box Manager</div></div>
  <div class="profile-tabs">
    <button class="ptab active-mycs" id="pm" onclick="switchP('mycs')">
      <div class="av" style="background:rgba(255,107,53,.25);color:var(--accent)">M</div>Mycs
    </button>
    <button class="ptab" id="pn" onclick="switchP('nams')">
      <div class="av" style="background:rgba(78,205,196,.25);color:var(--accent2)">N</div>Nams
    </button>
  </div>
  <div style="display:flex;gap:6px">
    <button onclick="exportBox()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px">☁ Export</button>
    <button onclick="document.getElementById('import-input').click()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px">📥 Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importBox(event)">
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sav av-m" id="sav">M</div>
      <h2 id="stit">Box de Mycs</h2>
      <span class="hcount" id="hcnt"></span>
      <button class="add-btn" id="abtn" onclick="openM()">+ Ajouter</button>
    </div>
    <div class="sw"><input type="text" id="srch" placeholder="Rechercher..." oninput="renderL()"></div>
    <div class="ff" id="ff"></div>
    <div class="hl" id="hl"></div>
  </div>
  <div class="main" id="main">
    <div class="empty-state"><div class="ei">⚔</div><p>Sélectionne un héros</p><small>ou clique "+ Ajouter" pour enrichir la box</small></div>
  </div>
</div>
<div class="overlay" id="ov">
  <div class="modal">
    <h3 id="mtit">Ajouter un héros</h3>
    <div class="mf">
      <label>Héros <span id="mcount" style="color:var(--text3);font-weight:400"></span></label>
      <input type="text" id="msearch" placeholder="Taper le nom du héros..." oninput="filterHeroes()" autocomplete="off" style="margin-bottom:6px;width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(191,127,255,.4);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit">
      <select id="mh" size="5" style="height:130px;width:100%" onchange="onHeroChosen()"><option value="">— Cherche ci-dessus —</option></select>
      <div class="hint" id="mhint" style="font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6"></div>
    </div>
    <div class="mf"><label>Niveau EX</label>
      <select id="mex">
        <option value="-1">Non débloqué</option>
        <option value="0" selected>+0 (débloqué)</option>
        <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option>
        <option value="4">+4</option><option value="5">+5</option><option value="6">+6</option>
        <option value="7">+7</option><option value="8">+8</option><option value="9">+9</option>
        <option value="10">+10</option><option value="11">+11</option><option value="12">+12</option>
        <option value="13">+13</option><option value="14">+14</option><option value="15">+15</option>
      </select>
    </div>
    <div class="mf"><label>Parangon</label>
      <select id="mpn">
        <option>Elite</option><option>Elite+</option><option>Epic</option><option>Epic+</option>
        <option>Légendaire</option><option>Légendaire+</option><option>Mythic</option><option>Mythic+</option>
        <option>Supreme</option><option>Supreme+</option><option>P1</option><option>P2</option><option>P3</option><option>P4</option>
      </select>
    </div>

    <div class="ma">
      <button class="btn bc" onclick="closeM()">Annuler</button>
      <button class="btn bo" id="mok" onclick="confirmA()">Ajouter</button>
    </div>
  </div>
</div>
<script>
const TL={
"Shemira":{tier:"S",faction:"Mort-vivant",dr:0.5,stage:4.0,pvp:0.5,cat:"SHEMIRA",rank:1,role:"Mage",note:"Vol de vie massif, tank mage auto-sustain.",excap:15},
"Galahad":{tier:"S",faction:"Pugiliste",dr:0.0,stage:1.0,pvp:1.5,cat:"REQUIRED",rank:2,role:"Mage",note:"Carry magique PvE très puissant.",excap:15},
"Silven":{tier:"A",faction:"Porteur de lumière",dr:1.0,stage:0.5,pvp:2.3,cat:"REQUIRED",rank:3,role:"Archer",note:"REQUIRED rang 3. Fort PvP et support allié.",excap:10},
"Solise":{tier:"S",faction:"Sauvageon",dr:0.5,stage:1.5,pvp:1.0,cat:"REQUIRED",rank:4,role:"Soutien",note:"Soins + offensif, REQUIRED rang 4.",excap:10},
"Daimon":{tier:"S",faction:"Mort-vivant",dr:2.0,stage:3.0,pvp:0.65,cat:"REQUIRED",rank:5,role:"Tank",note:"Tank magique, dégâts zone puissants sur boss.",excap:10},
"Pandora":{tier:"S",faction:"Dimensionnel",dr:0.0,stage:4.0,pvp:0.0,cat:"REQUIRED",rank:6,role:"Soutien",note:"Dégâts zone, excellent stages.",excap:10},
"Cyran":{tier:"S",faction:"Porteur de lumière",dr:4.0,stage:1.5,pvp:0.0,cat:"High Impact",rank:7,role:"Archer",note:"Excellent DR Boss (4.0), très fort stages.",excap:0},
"Velara":{tier:"S",faction:"Sauvageon",dr:0.5,stage:-1.0,pvp:2.65,cat:"High Impact",rank:8,role:"Soutien",note:"Cercle d'affaiblissement, fort PvP.",excap:10},
"Ravion":{tier:"S",faction:"Sauvageon",dr:2.0,stage:4.0,pvp:1.5,cat:"High Impact",rank:9,role:"Assassin",note:"Excellente en stages (score 4.0).",excap:10},
"Lily May":{tier:"S",faction:"Sauvageon",dr:3.5,stage:1.5,pvp:0.35,cat:"High Impact",rank:10,role:"Assassin",note:"Interrompt les ultimes ennemis, excellent DR.",excap:10},
"Zanie":{tier:"A",faction:"Porteur de lumière",dr:1.5,stage:2.0,pvp:2.15,cat:"High Impact",rank:11,role:"Archer",note:"Tourelles PvE, bon équilibre PvE/PvP.",excap:10},
"Ludovic":{tier:"S",faction:"Mort-vivant",dr:1.0,stage:3.0,pvp:1.0,cat:"High Impact",rank:12,role:"Soutien",note:"Soins + vol de vie, support stages solide.",excap:10},
"Faramor":{tier:"A",faction:"Sauvageon",dr:1.5,stage:1.0,pvp:1.65,cat:"High Impact",rank:13,role:"Assassin",note:"Excellent contre puissance salvatrice.",excap:10},
"Aile d'ombre":{tier:"A",faction:"Mort-vivant",dr:1.0,stage:1.5,pvp:2.15,cat:"High Impact",rank:14,role:"Assassin",note:"DPS continu, bon PvP.",excap:10},
"Hugin":{tier:"A",faction:"Porteur de lumière",dr:2.0,stage:0.0,pvp:0.65,cat:"High Impact",rank:15,role:"Soutien",note:"Buffs alliés, bon DR Boss.",excap:10},
"Tasi":{tier:"S",faction:"Sauvageon",dr:4.0,stage:2.0,pvp:1.5,cat:"Nice to Have",rank:16,role:"Mage",note:"Contrôle masse indispensable, DR excellent.",excap:10},
"Perseus":{tier:"S",faction:"Porteur de lumière",dr:1.5,stage:4.0,pvp:0.5,cat:"Nice to Have",rank:17,role:"Guerrier",note:"Lance et bouclier, très bon stages.",excap:10},
"Bonnie":{tier:"A",faction:"Mort-vivant",dr:2.5,stage:2.0,pvp:1.0,cat:"Nice to Have",rank:18,role:"Archer",note:"Affaiblit les ennemis, polyvalente.",excap:15},
"Cassadee":{tier:"S",faction:"Porteur de lumière",dr:1.5,stage:4.0,pvp:3.3,cat:"Nice to Have",rank:19,role:"Mage",note:"Dégâts zone + buffs, bon PvP.",excap:10},
